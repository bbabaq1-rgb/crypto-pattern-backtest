name: OKX State Audit

on:
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install ccxt

      - name: Dump OKX state
        env:
          OKX_KEY: ${{ secrets.OKX_KEY }}
          OKX_SECRET: ${{ secrets.OKX_SECRET }}
          OKX_PASSPHRASE: ${{ secrets.OKX_PASSPHRASE }}
        run: python audit_okx.py

      - name: Upload state
        uses: actions/upload-artifact@v4
        with:
          name: okx-state-${{ github.run_number }}
          path: okx_state.json
