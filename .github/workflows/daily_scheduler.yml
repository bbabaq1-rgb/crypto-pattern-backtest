name: Daily Paper Scheduler

on:
  schedule:
    - cron: '0 0 * * *'        # 매일 UTC 00:00 (한국시간 09:00)
  workflow_dispatch: {}         # 수동 실행 허용

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Create data directory
        run: mkdir -p data

      - name: Run scheduler (fetch -> regime -> signals -> paper -> Supabase)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          BITGET_DEMO_KEY: ${{ secrets.BITGET_DEMO_KEY }}
          BITGET_DEMO_SECRET: ${{ secrets.BITGET_DEMO_SECRET }}
          BITGET_DEMO_PASSPHRASE: ${{ secrets.BITGET_DEMO_PASSPHRASE }}
          OKX_KEY: ${{ secrets.OKX_KEY }}
          OKX_SECRET: ${{ secrets.OKX_SECRET }}
          OKX_PASSPHRASE: ${{ secrets.OKX_PASSPHRASE }}
        run: python scheduler.py oncefull

      - name: Upload result JSONs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scheduler-results-${{ github.run_number }}
          path: |
            signals_today.json
            paper_positions.json
            paper_trades.json
            direction_switch.json
          if-no-files-found: ignore

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: scheduler-logs-${{ github.run_number }}
          path: |
            *.json
            scheduler_log.txt
          if-no-files-found: ignore
