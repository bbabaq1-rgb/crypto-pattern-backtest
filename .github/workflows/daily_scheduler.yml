name: Crypto Pattern Scheduler

on:
  schedule:
    - cron: '0 * * * *'   # 매시 정각 (24회/일) — HOUR=0이면 oncefull, 나머지 oncequick
  workflow_dispatch:
    inputs:
      mode:
        description: 'oncefull / oncequick'
        required: false
        default: 'oncefull'

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Create data directory
        run: mkdir -p data

      - name: Run scheduler
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          OKX_KEY: ${{ secrets.OKX_KEY }}
          OKX_SECRET: ${{ secrets.OKX_SECRET }}
          OKX_PASSPHRASE: ${{ secrets.OKX_PASSPHRASE }}
        run: |
          # workflow_dispatch 수동 실행 시 mode 입력 우선
          MANUAL_MODE="${{ github.event.inputs.mode }}"
          if [ -n "$MANUAL_MODE" ]; then
            MODE="$MANUAL_MODE"
          else
            HOUR=$(date -u +%H | sed 's/^0//')
            if [ "$HOUR" = "0" ] || [ -z "$HOUR" ]; then
              MODE="oncefull"
            else
              MODE="oncequick"
            fi
          fi
          echo "실행 모드: $MODE (UTC $(date -u +%H:%M))"
          python scheduler.py "$MODE"

      - name: Upload result JSONs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scheduler-results-${{ github.run_number }}
          path: |
            signals_today.json
            paper_positions.json
            paper_trades.json
            direction_switch.json
          if-no-files-found: ignore

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: scheduler-logs-${{ github.run_number }}
          path: |
            *.json
            scheduler_log.txt
          if-no-files-found: ignore
