name: Crypto Pattern Scheduler

on:
  schedule:
    - cron: '0 */4 * * *'   # 4시간마다 (6회/일, UTC 00/04/08/12/16/20) — 00시=oncefull
  workflow_dispatch:
    inputs:
      mode:
        description: 'oncefull / oncequick'
        required: false
        default: 'oncefull'

# 중첩 실행 차단: 진행 중이면 새 실행은 대기 (진행 중인 건 완주)
concurrency:
  group: scheduler-${{ github.ref }}
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 15   # 정상 실행 ~3-5분 기준 — 초과는 확실한 이상 상황
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Create data directory
        run: mkdir -p data

      - name: Run scheduler
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          OKX_KEY: ${{ secrets.OKX_KEY }}
          OKX_SECRET: ${{ secrets.OKX_SECRET }}
          OKX_PASSPHRASE: ${{ secrets.OKX_PASSPHRASE }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          # workflow_dispatch 수동 실행 시 mode 입력 우선
          MANUAL_MODE="${{ github.event.inputs.mode }}"
          if [ -n "$MANUAL_MODE" ]; then
            MODE="$MANUAL_MODE"
          else
            HOUR=$(date -u +%H | sed 's/^0//')
            if [ "$HOUR" = "0" ] || [ -z "$HOUR" ]; then
              MODE="oncefull"
            else
              MODE="oncequick"
            fi
          fi
          echo "실행 모드: $MODE (UTC $(date -u +%H:%M))"
          python scheduler.py "$MODE"

      - name: Upload result JSONs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scheduler-results-${{ github.run_number }}
          path: |
            signals_today.json
            paper_positions.json
            paper_trades.json
            direction_switch.json
          if-no-files-found: ignore

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: scheduler-logs-${{ github.run_number }}
          path: |
            *.json
            scheduler_log.txt
          if-no-files-found: ignore
